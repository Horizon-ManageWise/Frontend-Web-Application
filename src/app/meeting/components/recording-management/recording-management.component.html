<h2>RECORDINGS</h2> <!-- Título general de la sección -->
<!-- Tabla de reuniones -->
<table mat-table [dataSource]="meeting" class="mat-elevation-z4">
  <!-- Definición de columnas -->
  <ng-container matColumnDef="title">
    <th mat-header-cell *matHeaderCellDef> Título </th>
    <td mat-cell *matCellDef="let element">
      {{ element.title }} / recording_ {{ element.id }} <!-- Muestra el título y el ID de la reunión como número de grabación -->
    </td>
  </ng-container>

  <ng-container matColumnDef="date">
    <th mat-header-cell *matHeaderCellDef> Fecha </th>
    <td mat-cell *matCellDef="let element"> {{ element.date | date: 'dd/MM/yyyy' }} </td>
  </ng-container>

  <ng-container matColumnDef="link">
    <th mat-header-cell *matHeaderCellDef> Enlace </th>
    <td mat-cell *matCellDef="let element">
      <button mat-raised-button class="open-link-button" (click)="openLink(element.link)">
        Abrir Link
      </button>
    </td>
  </ng-container>

  <ng-container matColumnDef="actions">
    <th mat-header-cell *matHeaderCellDef> Acciones </th>
    <td mat-cell *matCellDef="let element">
      <button mat-icon-button color="primary" (click)="onEditItem(element)">
        <mat-icon>edit</mat-icon>
      </button>
      <button mat-icon-button color="warn" (click)="onDeleteItem(element)">
        <mat-icon>delete</mat-icon>
      </button>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="['title', 'date', 'link', 'actions']"></tr>
  <tr mat-row *matRowDef="let row; columns: ['title', 'date', 'link', 'actions'];"></tr>
</table>
